name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://api.thatnewai.com

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy files via rsync
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASSWORD }}" rsync -avz --delete \
            -e "ssh -p ${{ secrets.HOSTINGER_SSH_PORT }} -o StrictHostKeyChecking=no" \
            dist/ \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }}:/home/${{ secrets.HOSTINGER_SSH_USER }}/domains/thatnewai.com/public_html/

      - name: Deploy .htaccess
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASSWORD }}" rsync -avz \
            -e "ssh -p ${{ secrets.HOSTINGER_SSH_PORT }} -o StrictHostKeyChecking=no" \
            .htaccess \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }}:/home/${{ secrets.HOSTINGER_SSH_USER }}/domains/thatnewai.com/public_html/.htaccess
