name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSH_USER: u996602862
      SSH_HOST: 147.93.101.192
      SSH_PORT: 65002
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://api.thatnewai.com

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy files via rsync
        env:
          SSHPASS: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
        run: |
          sshpass -e rsync -avz --delete \
            -e "ssh -p 65002 -o StrictHostKeyChecking=no" \
            dist/ \
            u996602862@147.93.101.192:/home/u996602862/domains/thatnewai.com/public_html/

      - name: Deploy .htaccess
        env:
          SSHPASS: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
        run: |
          sshpass -e rsync -avz \
            -e "ssh -p 65002 -o StrictHostKeyChecking=no" \
            .htaccess \
            u996602862@147.93.101.192:/home/u996602862/domains/thatnewai.com/public_html/.htaccess
